<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODOリスト</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-lg shadow p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6">TODOリスト</h1>

      <div class="flex gap-2 mb-6">
        <input
          id="todoInput"
          type="text"
          placeholder="タスクを入力..."
          class="flex-1 border border-gray-300 rounded px-3 py-2"/>
        <button
          id="addBtn"
          class="bg-blue-600 text-white font-bold px-4 py-2 rounded hover:bg-blue-700 transition">
          追加
        </button>
      </div>

      <ul id="todoList" class="space-y-2"></ul>
    </div>

    <script>
      const addButton = document.querySelector("#addBtn");
      const todoInput = document.querySelector("#todoInput");

      addButton.addEventListener("click", () => {
        const text = document.querySelector("#todoInput").value;

        // 何も入力されていなければ何もしない
        if (text === "") {
          return;
        }

        // li要素を作る
        const item = document.createElement("li");
        item.className =
          "flex items-center justify-between bg-gray-50 rounded px-3 py-2";

        // タスク的テキスト部分
        const span = document.createElement("span");
        span.textContent = text;

        const btnContainer = document.createElement("div");
        btnContainer.className = "flex gap-3";

        // 完了ボタン
        const doneBtn = document.createElement("button");
        doneBtn.textContent = "完了";
        doneBtn.className = "text-sm text-gray-500 hover:text-red-500";

        doneBtn.addEventListener("click", () => {
          span.classList.toggle("line-through");
          span.classList.toggle("text-gray-400");
        });
        
        // 削除ボタン
        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "削除";
        deleteBtn.className = "text-sm text-gray-500 hover:text-red-800"

        deleteBtn.addEventListener("click", () => {
          // 「OK」を押したときだけ削除を実行する
          if (confirm(`「${text}」を本当に削除しますか？`)) {
            item.remove();
          }
        });

        // ボタン類を容器にまとめる
        btnContainer.appendChild(doneBtn);
        btnContainer.appendChild(deleteBtn);

        // liの中にテキストと、ボタンの容器を入れる
        item.appendChild(span);
        item.appendChild(btnContainer);
        
        // 最終的なリストをulに追加
        const todoList = document.querySelector("#todoList");
        todoList.appendChild(item);

        // 入力欄をリセット
        todoInput.value = "";
      });
    </script>
  </body>
</html>
